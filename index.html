<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quicl-Cart</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">
            Quicl<span>-Cart</span>
        </div>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#products">Products</a></li>
                <li><a href="#categories">Categories</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>

        <div class="nav-right">
            <button id="themeToggle">🌙</button>
            <button class="cart-btn">🛒 Cart</button>
        </div>
    </header>


    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-text">
            <h1>Welcome to <span>Quicl-Cart</span></h1>
            <p>
                Smart Shopping Experience Designed by Deepak.
                Discover premium fashion, electronics, beauty,
                and modern lifestyle products.
            </p>

            <button class="shop-btn">Shop Now</button>
        </div>

        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200&auto=format&fit=crop" alt="shopping">
        </div>
    </section>


    <!-- Categories -->
</html>
