<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quicl-Cart | Modern Shopping</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="light-theme">

    <nav class="navbar">
        <div class="logo">Quicl-<span>Cart</span></div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Categories</a></li>
            <li><a href="#">Orders</a></li>
        </ul>
        <div class="nav-actions">
            <button id="theme-toggle" class="toggle-btn">🌙 Dark Mode</button>
            <div class="cart-icon">🛒 <span id="cart-count">0</span></div>
        </div>
    </nav>

    <header class="hero">
        <h1>Welcome, Deepak</h1>
        <p>Discover the latest trends with modern textures and lightning-fast delivery.</p>
        <button class="cta-btn">Shop Now</button>
    </header>

    <main class="container">
        <section class="product-grid" id="product-grid">
            <!-- Products will be dynamically generated here -->
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Quicl-Cart. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
